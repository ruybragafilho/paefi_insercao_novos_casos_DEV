<script>

  "use strict";
  
  /**
   * Função frontend que designa um caso
   *  
   * @param {String} id: id do caso de será designado 
   * @param {String} idMotivoDeDesignacao: id do motivo de designação 
   * @param {String} nomeTecnicoPAEFI: Nome do técnico do PAEFI, caso o tipo de designação seja Inserção no PAEFI
   *                                   "", para os outros tipos de designação            
   */  
  function designarCasoFE( idCaso, idMotivoDeDesignacao, nomeTecnicoPAEFI ) {

    // Mensagem de debug
    console.log( "designarCasoFE - INÍCIO" ); 


    // Chama função do Apps Script para designar um caso
    google.script.run
                 .withSuccessHandler( () => {

                   // Volta para a tela de resumos de casos  
                   console.log( "designarCasoFE - SuccessHandler" );                              
                   redirecionarParaTelaResumosDosCasos( 1 );                   

                 })
                 .withFailureHandler( erro => {

                   // mostra modal com mensagem de erro
                   console.log( "designarCasoFE - FailureHandler: " + erro.message );
                   mostrarModalErro( "designarCasoFE - FailureHandler: " + erro.message );
                   redirecionarParaTelaResumosDosCasos( 0 );

                 })
                 // Chama a função backend que designa o caso
                 .designarCasoBE( idCaso,                       
                                  idMotivoDeDesignacao,
                                  nomeTecnicoPAEFI );  

    // Mensagem de debug
    console.log( "designarCasoFE - FIM" );                               

  } // Fim da função designarCasoFE


</script>
