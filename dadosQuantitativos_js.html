  // #############  GRÁFICO MOTIVOS DE DESIGNAÇÃO  #############


  /**
   * Função que contabiliza a quantidade de cada tipo de motivo de designação de casos
   */
  async function gerarQuantitativoMotivosDeDesignacao() {

    // Aguarda carregamento das tabelas na cache de tabelas
    while( !tabelasCarregadasNaCache() ) {      
      await esperar( 1000 );
    }            

    // Inicializa os contadores de cada tipo de designação
    quantitativoMotivosDeDesignacao = new Array( cache_TabelaMotivosDeDesignacao.length + 1 ).fill( 0 );

    // Contabiliza a quantidade de casos em cada situação de benefício
    casosFiltrados.forEach( caso => {        

        if( caso.idMotivoDeDesignacao != "" ) {
          ++(quantitativoMotivosDeDesignacao[ parseInt(caso.idMotivoDeDesignacao) - 1 ]);
        } else {
          ++(quantitativoMotivosDeDesignacao[ quantitativoMotivosDeDesignacao.length - 1 ]);  
        }        
    });    

  } // Fim da função gerarQuantitativoMotivosDeDesignacao



  /**
   * Função que gera o gráfico de barras da quantidade de cada tipo de motivo de designação de casos
   */
  async function gerarGraficoQuantitativoMotivosDeDesignacao() {

    // Aguarda carregamento das tabelas na cache de tabelas
    while( !tabelasCarregadasNaCache() ) {
      await esperar( 1000 );
    }            

    // Chama a função para gerar o quantitativo de cada tipo de motivo de designação de casos
    gerarQuantitativoMotivosDeDesignacao();

    // Gera os Labels do gráfico com os nomes dos motivos de designação
    cache_TabelaMotivosDeDesignacao.forEach( sit_beneficio => {
      labelMotivosDeDesignacao.push( sit_beneficio[COLUNA_NOME] );  
    });
    labelMotivosDeDesignacao.push( "NÃO DESIGNADO" );

    // Gera o gráfico usando a biblioteca plotly.js
    const grafico = document.getElementById( "plotQuantitativoMotivosDeDesignacao" );    
    
    const data = [{
      x:labelMotivosDeDesignacao,
      y:quantitativoMotivosDeDesignacao,
      type:"bar",
      textposition: 'auto',
      orientation:"v",
      marker: {color:"rgba(0,0,255,0.6)"},
      text: quantitativoMotivosDeDesignacao.map(String),      
      hovertemplate: '%{x}: %{y}<br>' +                     
                     '<extra></extra>' // Hides the trace name box                     
    }];
    
    const layout = {
      title: { text: "<b>Motivos de Designação</b>" },                  
      height: 500, // Altura total  
      xaxis: {
        tickangle: -45,
        automargin: true
      }      
    };

    const config = {
      responsive: true,
      displayModeBar: false
    };      
    
    Plotly.newPlot(grafico, data, layout, config);

  } // Fim da função gerarGraficoQuantitativoMotivosDeDesignacao 



  // #############  GRÁFICO ÓRGÃOS ENCAMINHADORES  #############  


  /**
   * Função que contabiliza a quantidade de Órgãos Encaminhadores

    // Referencia para o array de categorias de um caso
    let orgaoEncaminhadorCaso = [];

    // Contabiliza a quantidade de categorias dos casos

      orgaoEncaminhadorCaso = caso.idsOrgaosEncaminhadores.split(";");

  // #############  GRÁFICO VIOLAÇÕES  #############  


  /**
   * Função que contabiliza a quantidade de Violações dos casos
   */
  async function gerarQuantitativoViolacoes() {

    // Aguarda carregamento das tabelas na cache de tabelas
    while( !tabelasCarregadasNaCache() ) {      
      await esperar( 1000 );
    }            

    // Número de violações
    numViolacoes = cache_TabelaViolacoes.length;

    // Inicializa os contadores de cada violação
    quantitativoViolacoes = new Array( numViolacoes + 1 ).fill( 0 );

    // Referencia para o array de violções de um caso
    let violacoesCaso = [];

    // Contabiliza a quantidade de violações dos casos
    casosFiltrados.forEach( caso => {        
      
      if( caso.idsViolacoes != ";;;;;;;;;;" ) {

        violacoesCaso = caso.idsViolacoes.split(";");
  
        for( let i=0; i<numViolacoes; ++i)  {
          if( violacoesCaso[i] != "" ) {
            ++quantitativoViolacoes[i];
          }                   
        }

      } else {
        ++quantitativoViolacoes[numViolacoes];
      }

    });    

  } // Fim da função gerarQuantitativoViolacoes

  // #############  GRÁFICO PARÂMETROS  #############  


  /**
   * Função que contabiliza a quantidade de Parâmetros dos casos
   */
  async function gerarQuantitativoParametros() {

    // Aguarda carregamento das tabelas na cache de tabelas
    while( !tabelasCarregadasNaCache() ) {      
      await esperar( 1000 );
    }            

    // Número de parâmetros
    numParametros = cache_TabelaParametros.length;

    // Inicializa os contadores de cada parâmetro
    quantitativoParametros = new Array( numParametros + 1 ).fill( 0 );

    // Referencia para o array de parametros de um caso
    let parametrosCaso = [];

    // Contabiliza a quantidade de parâmetros dos casos
    casosFiltrados.forEach( caso => {        
      
      if( caso.idsParametros != ";;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;" ) {

        parametrosCaso = caso.idsParametros.split(";");
  
        for( let i=0; i<numParametros; ++i)  {
          if( parametrosCaso[i] != "" ) {
            ++quantitativoParametros[i];
          }          
        }

      } else {
        ++quantitativoParametros[numParametros];
      }

    });    

  } // Fim da função gerarQuantitativoParametros

    // Aguarda carregamento das tabelas na cache de tabelas
    while( !tabelasCarregadasNaCache() ) {
      await esperar( 1000 );
    }            

    // Chama a função para gerar o quantitativo de parâmetros dos casos
    gerarQuantitativoParametros();

    // Gera os Labels do gráfico com os nomes dos parâmetros
    labelParametros = [
      "Determinação Judicial",
      "Reiteração do SGD",
      "Avaliação técnica/demanda espontânea",
      "Gestante e/ou puerpera",
      "Crianças até 2 anos",
      "Família sem rede de apoio familiar/comunitário",

      "Família não é beneficiária do PBF",
      "Familia monoparental",

      "Crianças não matriculadas na escola",

      "Reside sozinho e não tem RF para cuidados",
      "RF com transtorno mental / uso abusivo de álcool ou drogas",
      "Dependente para as atividades instrumentais",
      "Ameaças/agressões se tornaram mais frequentes / mais graves",
      "Não possui renda própria",

      "Possui filhos crianças e/ou adolescentes",

      "Não possui Medida Protetiva",
      "Agressor está descumprindo Medida Protetiva de afastamento",
      "Não registrou boletim de ocorrência",
      "Pessoa em situação de rua",
      "Violência relacionada à orientação sexual",
      "Violência de gênero",

      "Em situação de trabalho análogo à escravidão",
      "Criança de 02 a 12 anos",
      "Adolescente",
      "Idoso",
      "PcD",
      "Evasão escolar, infrequência, criança ou adolescente não matriculado",
      "Idoso/PCD com direitos violados / dependência / baixo grau autonomia",
      "Múltiplas violações simultâneas",
      "Família em situação de pobreza extrema",
      "PARÂMETROS NÃO INFORMADOS"
    ];


    // Filtra apenas os parâmetros ativos
    let quantitativoParametrosAtivos = [];
    let labelParametrosAtivos = [];
    for( let i=0; i<numParametros; ++i ) {

      if( cache_TabelaParametros[i][COLUNA_ATIVO] == 1 ) {

        quantitativoParametrosAtivos.push( quantitativoParametros[i] );
        labelParametrosAtivos.push( labelParametros[i] );
      }
    }
    quantitativoParametrosAtivos.push( quantitativoParametros[numParametros] );
    labelParametrosAtivos.push( labelParametros[numParametros] );


    const quantitativoParametrosAtivosReversed = quantitativoParametrosAtivos.toReversed();
    const labelParametrosAtivosReversed = labelParametrosAtivos.toReversed();

    // Gera o gráfico usando a biblioteca plotly.js

    };

    const config = {
      responsive: true,
      displayModeBar: false
    };      
    
    Plotly.newPlot(grafico, data, layout, config);

  } // Fim da função gerarGraficoQuantitativoParametros   
  

</script>
