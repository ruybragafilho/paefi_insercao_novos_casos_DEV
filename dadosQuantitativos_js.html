<script>

/**
 * Módulo:    dadosQuantitativos_js.html
 * Objetivo:  Módulo com funções que obtêm os dados quantitativos e gera seus gráficos
 */

  "use strict";  

  // Array para armazenar os valores X e Y do gráfico
  let quantitativoMotivosDeDesignacao;
  let labelMotivosDeDesignacao = [];


  /**
   * Função que contabiliza a quantidade de cada tipo de motivo de designação de casos
   */
  async function gerarQuantitativoMotivosDeDesignacao() {

    // Aguarda carregamento das tabelas na cache de tabelas
    while( !tabelasCarregadasNaCache() ) {      
      await esperar( 1000 );
    }            

    // Inicializa os contadores de cada tipo de designação
    quantitativoMotivosDeDesignacao = new Array( cache_TabelaMotivosDeDesignacao.length + 1 ).fill( 0 );

    // Contabiliza a quantidade de casos em cada situação de benefício
    casosFiltrados.forEach( caso => {        

        if( caso.idMotivoDeDesignacao != "" ) {
          ++(quantitativoMotivosDeDesignacao[ parseInt(caso.idMotivoDeDesignacao) - 1 ]);
        } else {
          ++(quantitativoMotivosDeDesignacao[ quantitativoMotivosDeDesignacao.length - 1 ]);  
        }        
    })    

  } // Fim da função gerarQuantitativoMotivosDeDesignacao



  /**
   * Função que gera o gráfico de barras da quantidade de cada tipo de motivo de designação de casos
   */
  async function gerarGraficoQuantitativoMotivosDeDesignacao() {

    // Aguarda carregamento das tabelas na cache de tabelas
    while( !tabelasCarregadasNaCache() ) {
      await esperar( 1000 );
    }            

    // Chama a função para gerar o quantitativo de cada tipo de motivo de designação de casos
    gerarQuantitativoMotivosDeDesignacao();

    // Gera os Labels do gráfico com os nomes dos motivos de designação
    cache_TabelaMotivosDeDesignacao.forEach( sit_beneficio => {
      labelMotivosDeDesignacao.push( sit_beneficio[COLUNA_NOME] );  
    });
    labelMotivosDeDesignacao.push( "NÃO DESIGNADO" );

    // Gera o gráfico usando a biblioteca plotly.js
    const grafico = document.getElementById( "plotQuantitativoMotivosDeDesignacao" );    
    
    const data = [{
      x:labelMotivosDeDesignacao,
      y:quantitativoMotivosDeDesignacao,
      type:"bar",
      text: quantitativoMotivosDeDesignacao.map(String),
      textposition: 'auto',
      orientation:"v",
      marker: {color:"rgba(0,0,255,0.6)"},
      hovertemplate: '(%{x}, %{y})'
    }];
    
    const layout = {
      height: 500, // Altura total  
      xaxis: {
        tickangle: -45,
        automargin: true
      }      
    };

    const config = {
      responsive: true,
      displayModeBar: false
    };      
    
    Plotly.newPlot(grafico, data, layout, config);

  } // Fim da função gerarGraficoQuantitativoMotivosDeDesignacao 
  

</script>
